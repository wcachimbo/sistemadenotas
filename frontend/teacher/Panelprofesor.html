<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Profesor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h1>Panel del Profesor</h1>
    <p id="bienvenidaProfesor"></p>
    <button onclick="cerrarSesionProfesor()">Cerrar Sesión</button>
</header>

<main>

    <!-- AGREGAR NOTA -->
    <section>
        <h2>Agregar Nota</h2>
        <form id="formAgregarNota">

            <label>Estudiante</label>
            <select id="selectEstudiante" required>
                <!-- Se llenará dinámicamente con estudiantes -->
            </select>

            <label>Materia</label>
            <input type="text" id="materia" required>

            <label>Nota</label>
            <input type="number" id="nota" min="0" max="5" step="0.1" required>

            <button type="submit">Guardar Nota</button>
        </form>
    </section>

    <!-- LISTA DE NOTAS -->
    <section>
        <h2>Notas Registradas</h2>
        <table border="1" cellpadding="5">
            <thead>
                <tr>
                    <th>Estudiante</th>
                    <th>Materia</th>
                    <th>Nota</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaNotas">
                <!-- Notas se insertarán dinámicamente -->
            </tbody>
        </table>
    </section>

</main>

<script src="java.js"></script>
</body>
</html>
